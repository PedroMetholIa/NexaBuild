<nav>
  <div class="container nav-container">
    <a routerLink="/" class="logo">
      <svg width="38" height="38" viewBox="0 0 32 32" fill="none">
        <polygon points="16,2 28,9 28,23 16,30 4,23 4,9"
          fill="rgba(0,212,200,0.08)" stroke="url(#snb)" stroke-width="2.2" stroke-linejoin="round"/>
        <line x1="16" y1="2"  x2="16" y2="7.5" stroke="url(#snb)" stroke-width="2" stroke-linecap="round"/>
        <line x1="16" y1="24.5" x2="16" y2="30" stroke="url(#snb)" stroke-width="2" stroke-linecap="round"/>
        <circle cx="16" cy="16" r="4" fill="url(#snb)"/>
        <circle cx="16" cy="16" r="6.5" fill="none" stroke="url(#snb)" stroke-width="1" opacity="0.3"/>
        <defs><linearGradient id="snb" x1="4" y1="2" x2="28" y2="30" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#7C5CFC"/><stop offset="100%" stop-color="#00BCD4"/>
        </linearGradient></defs>
      </svg>
      <span class="logo-text">Nexa<em>Build</em></span>
    </a>
    <div class="nav-actions">
      @if (isLoggedIn()) {
        <div class="nav-user-area" (click)="$event.stopPropagation()">
          <span class="nav-user-name">¡Hola {{ userName() }}!</span>
          <button class="nav-dropdown-trigger" (click)="toggleMenu()">
            <i class="ti ti-chevron-down" [class.nav-chevron-open]="menuOpen()"></i>
          </button>
          @if (menuOpen()) {
            <div class="nav-dropdown-panel">
              <button class="nav-dropdown-item" (click)="logout()">
                <i class="ti ti-logout"></i> Cerrar sesión
              </button>
            </div>
          }
        </div>
        <button class="nav-btn nav-logout nav-logout-desktop" (click)="logout()">Cerrar sesión</button>
      } @else {
        <a class="nav-login" (click)="openModal(false)">Iniciar sesión</a>
        <a class="nav-btn" (click)="openModal(true)">Crear cuenta</a>
      }
    </div>
  </div>
</nav>

<main>
  <router-outlet />
</main>

<footer>
  <div class="footer-inner">
    <p>© 2026 NexaBuild — Montevideo, Uruguay</p>
    <a routerLink="/" class="logo">
      <svg width="38" height="38" viewBox="0 0 32 32" fill="none">
        <polygon points="16,2 28,9 28,23 16,30 4,23 4,9"
          fill="rgba(0,212,200,0.08)" stroke="url(#snbf)" stroke-width="2.2" stroke-linejoin="round"/>
        <line x1="16" y1="2"  x2="16" y2="7.5" stroke="url(#snbf)" stroke-width="2" stroke-linecap="round"/>
        <line x1="16" y1="24.5" x2="16" y2="30" stroke="url(#snbf)" stroke-width="2" stroke-linecap="round"/>
        <circle cx="16" cy="16" r="4" fill="url(#snbf)"/>
        <circle cx="16" cy="16" r="6.5" fill="none" stroke="url(#snbf)" stroke-width="1" opacity="0.3"/>
        <defs><linearGradient id="snbf" x1="4" y1="2" x2="28" y2="30" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#7C5CFC"/><stop offset="100%" stop-color="#00BCD4"/>
        </linearGradient></defs>
      </svg>
      <span class="logo-text">Nexa<em>Build</em></span>
    </a>
  </div>
</footer>

@if (modalOpen()) {
  <div class="modal-backdrop" (click)="closeModal()">
    <div class="modal-card" (click)="$event.stopPropagation()">
      <button class="modal-close" (click)="closeModal()">
        <i class="ti ti-x"></i>
      </button>
      <app-auth [modal]="true" [startRegister]="modalRegister()" />
    </div>
  </div>
}
